<div class="anim-wrapper">
  <div class="anim-scene">
    <!-- Ordenador -->
    <div class="anim-pc">
      <i class="bi bi-pc-display"></i>
    </div>

    <!-- Datos viajando -->
    <div class="anim-flow">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>

    <!-- Nube que procesa -->
    <div class="anim-cloud">
      <i class="bi bi-cloud"></i>
      <i class="bi bi-gear-fill anim-gear"></i>
    </div>
  </div>

  <p class="anim-text">
    <span class="spinner-border spinner-border-sm me-2"></span>{{ mensaje() }}
  </p>
</div>
